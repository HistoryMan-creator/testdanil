          {
            type: 'tf',
            statement: 'Университетский устав 1884 года значительно расширил автономию университетов и права студентов.',
            isTrue: false,
            explanation: 'Наоборот, это была классическая контрреформа! Устав 1884 г. полностью ЛИКВИДИРОВАЛ автономию университетов, вернув строгий государственный контроль.'
          },
          {
            type: 'tf',
            statement: 'В годы правления Александра III была окончательно отменена подушная подать, введенная еще при Петре I.',
            isTrue: true,
            explanation: 'Верно. В 1885 году министр финансов Н.Х. Бунге добился отмены этого архаичного налога, перенеся тяжесть обложения на косвенные налоги.'
          },
          {
            type: 'match',
            question: 'Реформы и документы Александра III:',
            pairs: [
              { term: '«Циркуляр о кухаркиных детях»', def: 'Ограничение приема в гимназии детей низших сословий' },
              { term: 'Земская контрреформа (1890)', def: 'Увеличение дворянского представительства в органах местного самоуправления' },
              { term: 'Манифест о незыблемости самодержавия', def: 'Документ 1881 г., означавший конец либеральным надеждам на конституцию' },
              { term: 'Закон о штрафах (1886)', def: 'Часть рабочего законодательства, принятая после Морозовской стачки' }
            ],
            distractors: [
              'Судебные уставы',
              'Отмена местничества'
            ]
          },
          {
            type: 'order',
            question: 'Хронология эпохи контрреформ:',
            items: [
              'Издание Манифеста о незыблемости самодержавия',
              'Принятие нового (консервативного) Университетского устава',
              'Морозовская стачка и появление рабочего законодательства',
              'Издание "Циркуляра о кухаркиных детях"',
              'Введение института Земских начальников',
              'Оформление Франко-русского союза'
            ]
          }
        ]
      }
    ];

    // --- СОСТОЯНИЕ (STATE) ---
    let state = {
      view: 'map',
      currentLevelId: null,
      unlockedLevels: CAMPAIGN.map(level => level.id), // ВСЕ УРОВНИ ОТКРЫТЫ СРАЗУ (для тестов)
      completedLevels: [],
      phase: 'theory', // 'theory', 'tasks', 'result'
      step: 0,
      currentTaskIndex: 0,
      
      mcqAnswered: false, mcqSelected: null, mcqOptions: null,
      tfAnswered: null, tfSelected: null,
      orderAvailable: [], orderSelected: [], orderError: false, orderProcessing: false,
      matchTerms: [], matchDefs: [], matchSelectedTerm: null, matchSelectedDef: null, matchPairs: [], matchError: false, matchProcessing: false
    };

    const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);

    // --- ОСНОВНОЙ РЕНДЕР ---
    function render() {
      const app = document.getElementById('app');
      let html = '';

      const rank = getRank();
      html += `
        <header class="bg-indigo-950 text-indigo-100 p-4 flex justify-between items-center shrink-0 z-10 border-b border-indigo-800 shadow-md">
          <div class="flex items-center gap-3">
            <i data-lucide="book-open" class="text-amber-400"></i>
            <h1 class="font-bold text-sm tracking-wider uppercase drop-shadow-md">Российская Империя</h1>
          </div>
          ${state.completedLevels.length > 0 ? `
            <div class="flex items-center gap-1 font-bold text-emerald-400 bg-indigo-900 px-3 py-1 rounded-full border border-indigo-700">
              <i data-lucide="award" class="w-4 h-4"></i>
              <span>${state.completedLevels.length} / ${CAMPAIGN.length}</span>
            </div>
          ` : ''}
        </header>
      `;

      html += `<div class="flex-1 overflow-hidden relative flex flex-col min-h-0">`;
      
      if (state.view === 'map') {
        html += renderMap(rank);
      } else if (state.view === 'level') {
        const level = CAMPAIGN.find(l => l.id === state.currentLevelId);
        html += renderLevel(level);
      }

      html += `</div>`;
      app.innerHTML = html;
      lucide.createIcons();
    }

    function getRank() {
      const p = state.completedLevels.length;
      if (p === CAMPAIGN.length) return 'Император Всероссийский';
      if (p >= 8) return 'Канцлер империи';
      if (p >= 6) return 'Тайный советник';
      if (p >= 4) return 'Столбовой дворянин';
      if (p >= 2) return 'Купец I гильдии';
      if (p >= 1) return 'Мещанин';
      return 'Крепостной крестьянин';
    }

    // --- РЕНДЕР КАРТЫ ---
    function renderMap(rank) {
      let linesHtml = '';
      for (let i = 0; i < CAMPAIGN.length - 1; i++) {
        const l1 = CAMPAIGN[i];
        const l2 = CAMPAIGN[i+1];
        const isCompleted = state.completedLevels.includes(l1.id);
        linesHtml += `<line x1="${l1.x}%" y1="${l1.y}%" x2="${l2.x}%" y2="${l2.y}%" stroke="${isCompleted ? '#10b981' : '#4f46e5'}" stroke-width="4" stroke-dasharray="${isCompleted ? '0' : '8 8'}" />`;
      }

      let nodesHtml = '';
      CAMPAIGN.forEach(level => {
        const isUnlocked = state.unlockedLevels.includes(level.id);
        const isCompleted = state.completedLevels.includes(level.id);
        
        let icon = isCompleted ? '<i data-lucide="check" class="text-white w-8 h-8"></i>' : 
                   isUnlocked ? '<i data-lucide="map" class="text-amber-100 w-7 h-7"></i>' : 
                   '<i data-lucide="lock" class="text-indigo-400 w-6 h-6"></i>';
        
        let btnClass = isCompleted ? 'bg-emerald-600 border-emerald-300 scale-105' : 
                       isUnlocked ? 'bg-indigo-700 border-amber-500 hover:scale-110 cursor-pointer shadow-[0_0_15px_rgba(251,191,36,0.3)]' : 
                       'bg-indigo-900 border-indigo-700 opacity-60 cursor-not-allowed';

        nodesHtml += `
          <button ${!isUnlocked ? 'disabled' : ''} onclick="startLevel('${level.id}')" class="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center group" style="left: ${level.x}%; top: ${level.y}%; z-index: 10;">
            <div class="mb-2 bg-indigo-950 border border-indigo-600 px-3 py-1 rounded-lg text-xs font-bold shadow-lg whitespace-nowrap opacity-95 text-indigo-200">${level.years}</div>
            <div class="w-16 h-16 rounded-full flex items-center justify-center border-4 shadow-xl transition-all duration-300 ${btnClass}">
              ${icon}
            </div>
            <span class="mt-2 font-bold text-sm text-center w-40 drop-shadow-md transition-colors ${isCompleted ? 'text-emerald-400' : isUnlocked ? 'text-indigo-50' : 'text-indigo-500'}">${level.title}</span>
          </button>
        `;
      });

      return `
        <div class="h-full relative bg-indigo-900 overflow-y-auto overflow-x-hidden p-6 map-bg min-h-0">
          <div class="mb-6 bg-indigo-950 border border-indigo-800 rounded-2xl p-4 flex items-center justify-between shadow-lg sticky top-0 z-20">
            <div>
              <div class="flex items-center gap-2 mb-1">
                 <p class="text-indigo-300 text-xs font-bold uppercase tracking-wider">Табель о рангах</p>
                 ${state.completedLevels.length > 0 ? `
                   <button onclick="resetProgress()" class="text-indigo-400 hover:text-rose-400 transition" title="Сбросить прогресс">
                     <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i>
                   </button>
                 ` : ''}
              </div>
              <h2 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-300 to-yellow-600">${rank}</h2>
            </div>
            <div class="w-12 h-12 bg-indigo-900 rounded-full border-2 border-amber-500 flex items-center justify-center shrink-0 shadow-[0_0_10px_rgba(251,191,36,0.5)]">
              <i data-lucide="crown" class="text-amber-400 w-6 h-6"></i>
            </div>
          </div>
          <div class="relative h-[1600px] w-full mt-4">
            <svg class="absolute inset-0 w-full h-full pointer-events-none" style="z-index: 0;">${linesHtml}</svg>
            ${nodesHtml}
          </div>
        </div>
      `;
    }

    // --- РЕНДЕР УРОВНЯ ---
    function renderLevel(level) {
      let content = '';

      if (state.phase === 'theory') {
        const card = level.theory[state.step];
        const formattedText = card.content.replace(/<b>(.*?)<\/b>/g, '<strong class="text-amber-300 font-black tracking-wide">$1</strong>').replace(/<i>(.*?)<\/i>/g, '<em class="text-indigo-300 not-italic font-bold">$1</em>');
        
        let dots = '';
        level.theory.forEach((_, i) => {
          dots += `<div class="h-1.5 flex-1 rounded-full transition-colors duration-300 ${i <= state.step ? 'bg-amber-400 shadow-[0_0_8px_rgba(251,191,36,0.6)]' : 'bg-indigo-800'}"></div>`;
        });

        content = `
          <div class="flex flex-col h-full min-h-0 animate-in fade-in duration-300">
            <div class="flex-1 overflow-y-auto min-h-0 p-4 sm:p-6 pb-4">
              <div class="flex gap-1 mb-4 shrink-0">${dots}</div>
              <div class="bg-indigo-950 border border-indigo-700 p-5 sm:p-6 rounded-2xl shadow-xl flex flex-col relative">
                <h2 class="text-xl font-bold text-indigo-50 mb-4 border-b border-indigo-800 pb-4 shrink-0">${card.title}</h2>
                <div class="space-y-4 text-indigo-100 leading-relaxed text-sm font-medium">
                  ${formattedText.split('\n\n').map(p => `<p>${p}</p>`).join('')}
                </div>
              </div>
            </div>
            <div class="shrink-0 p-4 sm:p-6 pt-2 bg-indigo-900 border-t border-indigo-800">
              <button onclick="nextTheory()" class="bg-gradient-to-r from-amber-600 to-yellow-600 hover:from-amber-500 hover:to-yellow-500 text-indigo-950 font-black py-4 px-6 rounded-xl w-full flex justify-center items-center gap-2 shadow-lg transition-transform active:scale-95 uppercase tracking-wide">
                ${state.step < level.theory.length - 1 ? 'Дальше' : 'К заданиям'} <i data-lucide="arrow-right" class="w-5 h-5"></i>
              </button>
            </div>
          </div>
        `;
      } 
      else if (state.phase === 'tasks') {
        const task = level.tasks[state.currentTaskIndex];
        const progressW = ((state.currentTaskIndex + 1) / level.tasks.length) * 100;
        
        let taskHtml = '';
        if (task.type === 'mcq') taskHtml = renderMCQ(task);
        if (task.type === 'tf') taskHtml = renderTF(task);
        if (task.type === 'order') taskHtml = renderOrder(task);
        if (task.type === 'match') taskHtml = renderMatch(task);

        content = `
          <div class="flex flex-col h-full min-h-0">
            <div class="px-4 sm:px-6 pt-4 pb-2 shrink-0">
              <div class="flex justify-between items-center mb-2">
                <span class="text-xs font-bold text-indigo-300 uppercase tracking-widest">Практика ${state.currentTaskIndex + 1} / ${level.tasks.length}</span>
              </div>
              <div class="h-1.5 bg-indigo-950 rounded-full w-full overflow-hidden border border-indigo-800">
                <div class="h-full bg-gradient-to-r from-amber-400 to-yellow-400 transition-all duration-500 shadow-[0_0_10px_rgba(251,191,36,0.8)]" style="width: ${progressW}%"></div>
              </div>
            </div>
            <div class="flex-1 flex flex-col min-h-0">
               ${taskHtml}
            </div>
          </div>
        `;
      }
      else if (state.phase === 'result') {
        content = `
          <div class="h-full flex flex-col items-center justify-center p-6 text-center animate-in zoom-in duration-500">
            <div class="w-24 h-24 bg-emerald-500 rounded-full flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(16,185,129,0.4)] shrink-0 border-4 border-emerald-300">
              <i data-lucide="star" class="text-white w-12 h-12 fill-white"></i>
            </div>
            <h2 class="text-3xl font-black mb-2 text-white shrink-0">Эпоха усвоена!</h2>
            <p class="text-indigo-300 mb-8 shrink-0">Исторические факты, причины и следствия надежно закреплены в памяти.</p>
            <div class="w-full shrink-0">
               <button onclick="finishLevel()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95 uppercase tracking-wider">
                 Вернуться на карту
               </button>
            </div>
          </div>
        `;
      }

      return `
        <div class="p-4 bg-indigo-950 border-b border-indigo-800 flex justify-between items-center shadow-md shrink-0">
          <button onclick="goMap()" class="text-indigo-400 hover:text-amber-400 flex items-center gap-1 transition-colors">
            <i data-lucide="chevron-left" class="w-5 h-5"></i> <span class="text-sm font-medium">Карта</span>
          </button>
          <span class="text-amber-400 font-bold text-sm uppercase drop-shadow-md">${level.years}</span>
          <div class="w-8 shrink-0"></div>
        </div>
        <div class="flex-1 overflow-hidden relative flex flex-col min-h-0 bg-indigo-900">${content}</div>
      `;
    }

    // --- РЕНДЕРЫ МИНИ-ИГР ---

    function renderMCQ(data) {
      if (!state.mcqOptions) state.mcqOptions = shuffle([...data.options]); 
      
      let optsHtml = state.mcqOptions.map((opt) => {
        let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex items-center justify-between shadow-sm ";
        let icon = '';
        if (!state.mcqAnswered) {
          btnClass += "border-indigo-700 bg-indigo-950 text-indigo-100 hover:border-amber-400 hover:shadow-[0_0_10px_rgba(251,191,36,0.2)]";
        } else {
          if (opt === data.correctOption) {
            btnClass += "border-emerald-500 bg-emerald-900/40 text-emerald-300";
            icon = '<i data-lucide="check" class="text-emerald-400 w-5 h-5 flex-shrink-0 ml-2"></i>';
          } else if (opt === state.mcqSelected) {
            btnClass += "border-rose-500 bg-rose-900/40 text-rose-300";
            icon = '<i data-lucide="x" class="text-rose-400 w-5 h-5 flex-shrink-0 ml-2"></i>';
          } else {
            btnClass += "border-indigo-800 bg-indigo-950/50 text-indigo-400 opacity-50";
          }
        }
        return `<button ${state.mcqAnswered ? 'disabled' : ''} onclick="checkMCQ('${opt.replace(/'/g, "\\'")}')" class="${btnClass}"><span class="text-sm font-medium leading-snug">${opt}</span>${icon}</button>`;
      }).join('');

      let resultHtml = '';
      let footerHtml = '';
      if (state.mcqAnswered) {
        const isCorrect = state.mcqSelected === data.correctOption;
        resultHtml = `
          <div class="mt-4 p-4 rounded-xl flex gap-3 shrink-0 ${isCorrect ? 'bg-emerald-900/40 border border-emerald-800' : 'bg-rose-900/40 border border-rose-800'} animate-in slide-in-from-bottom-4 shadow-lg">
             <i data-lucide="${isCorrect ? 'check' : 'x'}" class="${isCorrect ? 'text-emerald-400' : 'text-rose-400'} mt-1 shrink-0 w-6 h-6"></i>
             <div>
               <h4 class="font-bold mb-1 ${isCorrect ? 'text-emerald-400' : 'text-rose-400'} uppercase text-sm tracking-wider">${isCorrect ? 'Абсолютно верно!' : 'Историческая ошибка!'}</h4>
               <p class="text-sm text-indigo-100 leading-relaxed">${data.explanation}</p>
             </div>
          </div>
        `;
        footerHtml = `
          <div class="shrink-0 p-4 sm:p-6 pt-2 bg-indigo-900 border-t border-indigo-800">
             <button onclick="${isCorrect ? 'nextTask()' : 'resetMCQ()'}" class="w-full font-black uppercase tracking-wider py-4 rounded-xl shadow-lg transition-transform active:scale-95 ${isCorrect ? 'bg-gradient-to-r from-amber-500 to-yellow-600 text-indigo-950' : 'bg-indigo-800 text-indigo-200 border border-indigo-600'}">${isCorrect ? 'Следующий вопрос' : 'Попробовать снова'}</button>
          </div>
        `;
      }

      return `
        <div class="flex flex-col h-full min-h-0">
          <div class="flex-1 overflow-y-auto min-h-0 p-4 sm:p-6 pb-4">
            <h3 class="text-lg font-bold text-indigo-50 mb-5 leading-snug shrink-0 drop-shadow-sm">${data.question}</h3>
            <div class="space-y-3 shrink-0">${optsHtml}</div>
            ${resultHtml}
          </div>
          ${footerHtml}
        </div>
      `;
    }

    function renderTF(data) {
      let resultHtml = '';
      let footerHtml = '';
      if (state.tfAnswered !== null) {
        const isCorrect = state.tfAnswered;
        resultHtml = `
          <div class="mt-4 p-4 rounded-xl flex gap-3 shrink-0 ${isCorrect ? 'bg-emerald-900/40 border border-emerald-800' : 'bg-rose-900/40 border border-rose-800'} animate-in slide-in-from-bottom-4 shadow-lg">
             <i data-lucide="${isCorrect ? 'check' : 'x'}" class="${isCorrect ? 'text-emerald-400' : 'text-rose-400'} mt-1 shrink-0 w-6 h-6"></i>
             <div>
               <h4 class="font-bold mb-1 ${isCorrect ? 'text-emerald-400' : 'text-rose-400'} uppercase text-sm tracking-wider">${isCorrect ? 'Верно рассуждаете!' : 'Факт не подтвердился!'}</h4>
               <p class="text-sm text-indigo-100 leading-relaxed">${data.explanation}</p>
             </div>
          </div>
        `;
        footerHtml = `
          <div class="shrink-0 p-4 sm:p-6 pt-2 bg-indigo-900 border-t border-indigo-800">
             <button onclick="${isCorrect ? 'nextTask()' : 'resetTF()'}" class="w-full font-black uppercase tracking-wider py-4 rounded-xl shadow-lg transition-transform active:scale-95 ${isCorrect ? 'bg-gradient-to-r from-amber-500 to-yellow-600 text-indigo-950' : 'bg-indigo-800 text-indigo-200 border border-indigo-600'}">${isCorrect ? 'Продолжить' : 'Попробовать снова'}</button>
          </div>
        `;
      } else {
         footerHtml = `
          <div class="shrink-0 p-4 sm:p-6 pt-2 bg-indigo-900 border-t border-indigo-800">
            <div class="flex gap-4">
              <button onclick="checkTF(false)" class="flex-1 bg-indigo-950 hover:bg-indigo-800 border-2 border-indigo-700 text-indigo-100 font-bold py-5 rounded-2xl flex flex-col items-center gap-2 shadow-md transition-colors"><i data-lucide="x" class="text-rose-400 w-8 h-8"></i>Ложь</button>
              <button onclick="checkTF(true)" class="flex-1 bg-indigo-950 hover:bg-indigo-800 border-2 border-indigo-700 text-indigo-100 font-bold py-5 rounded-2xl flex flex-col items-center gap-2 shadow-md transition-colors"><i data-lucide="check" class="text-emerald-400 w-8 h-8"></i>Правда</button>
            </div>
          </div>
         `;
      }

      return `
        <div class="flex flex-col h-full min-h-0">
          <div class="flex-1 overflow-y-auto min-h-0 p-4 sm:p-6 pb-4 flex flex-col">
            <div class="text-center mb-4 shrink-0"><span class="bg-indigo-950 text-amber-300 text-xs font-bold uppercase tracking-widest px-3 py-1.5 rounded-full border border-indigo-700 shadow-sm">Верно ли утверждение?</span></div>
            <div class="bg-indigo-950 p-6 sm:p-8 rounded-2xl border-2 mb-4 shrink-0 flex items-center justify-center min-h-[160px] shadow-inner ${state.tfAnswered === true ? 'border-emerald-500/50 bg-emerald-900/10' : state.tfAnswered === false ? 'border-rose-500/50 bg-rose-900/10' : 'border-indigo-700'}">
              <h3 class="text-lg sm:text-xl font-medium text-center text-indigo-50 leading-relaxed">«${data.statement}»</h3>
            </div>
            ${resultHtml}
          </div>
          ${footerHtml}
        </div>
      `;
    }

    function renderOrder(data) {
      if (state.orderAvailable.length === 0 && state.orderSelected.length === 0) {
        state.orderAvailable = shuffle(data.items.map((t, i) => ({ id: i, text: t })));
      }

      let slotsHtml = '';
      for (let i = 0; i < data.items.length; i++) {
        const item = state.orderSelected[i];
        if (item) {
          slotsHtml += `<div class="relative z-10 flex items-center gap-3 mb-2">
            <div class="w-8 h-8 rounded-full bg-indigo-950 border-2 border-indigo-600 flex items-center justify-center text-xs font-bold text-amber-400 shrink-0 shadow-inner">${i+1}</div>
            <button ${state.orderProcessing ? 'disabled' : ''} onclick="deselectOrder(${item.id})" class="flex-1 p-3 rounded-xl text-left text-sm ${state.orderError ? 'bg-rose-900/40 border-rose-500/50 text-rose-100' : 'bg-indigo-700/50 border-amber-500/50 text-amber-50 hover:bg-indigo-600'} border-2 transition-all shadow-sm">${item.text}</button>
          </div>`;
        } else {
          slotsHtml += `<div class="relative z-10 flex items-center gap-3 mb-2">
            <div class="w-8 h-8 rounded-full bg-indigo-950 border-2 border-indigo-800 flex items-center justify-center text-xs font-bold text-indigo-500 shrink-0">${i+1}</div>
            <div class="flex-1 border-2 border-dashed border-indigo-700 bg-indigo-950/30 h-12 rounded-xl"></div>
          </div>`;
        }
      }

      let btnsHtml = state.orderAvailable.map(item => `
        <button ${state.orderProcessing ? 'disabled' : ''} onclick="selectOrder(${item.id})" class="bg-indigo-950 border border-indigo-600 hover:border-amber-400 px-3 py-2 sm:px-4 sm:py-2.5 rounded-xl text-sm text-indigo-100 shadow-md disabled:opacity-50 transition-colors">${item.text}</button>
      `).join('');

      const isFull = state.orderSelected.length === data.items.length;
      return `
        <div class="flex flex-col h-full min-h-0">
          <div class="flex-1 overflow-y-auto min-h-0 p-4 sm:p-6 pb-4">
            <h3 class="text-base font-bold text-center mb-5 text-indigo-100 shrink-0 drop-shadow-sm">${data.question}</h3>
            <div class="mb-6 relative shrink-0">
              <div class="absolute left-4 top-4 bottom-4 w-0.5 bg-indigo-800 z-0"></div>
              ${slotsHtml}
            </div>
            <p class="text-xs text-center mb-3 uppercase tracking-widest font-bold shrink-0 ${state.orderError ? 'text-rose-400 animate-pulse' : 'text-indigo-400'}">${state.orderError ? 'Ошибка! Запоминайте порядок...' : 'Выберите события по порядку'}</p>
            <div class="flex flex-wrap gap-2 justify-center pb-2 shrink-0">${btnsHtml}</div>
          </div>
          <div class="shrink-0 p-4 sm:p-6 pt-2 bg-indigo-900 border-t border-indigo-800">
            <button ${!isFull || state.orderProcessing ? 'disabled' : ''} onclick="checkOrder()" class="w-full font-black uppercase tracking-wider py-4 rounded-xl transition-all shadow-lg ${isFull && !state.orderProcessing ? 'bg-gradient-to-r from-amber-500 to-yellow-600 text-indigo-950 active:scale-95' : 'bg-indigo-950 text-indigo-600 border border-indigo-800 cursor-not-allowed'}">Проверить хронологию</button>
          </div>
        </div>
      `;
    }

    function renderMatch(data) {
      if (state.matchTerms.length === 0) {
        const pairedData = data.pairs.map((p, i) => ({ ...p, id: i.toString() }));
        const termsArray = pairedData.map(p => ({ id: p.id, text: p.term }));
        let defsArray = pairedData.map(p => ({ id: p.id, text: p.def }));
        
        if (data.distractors) {
          const distDefs = data.distractors.map((text, i) => ({ id: `dist-${i}`, text: text }));
          defsArray = [...defsArray, ...distDefs];
        }
        
        state.matchTerms = shuffle(termsArray);
        state.matchDefs = shuffle(defsArray);
      }

      const drawColumn = (items, type) => items.map(item => {
        const isMatched = state.matchPairs.includes(item.id);
        const isSelected = (type === 'term' ? state.matchSelectedTerm : state.matchSelectedDef) === item.id;
        
        let cls = "p-3 rounded-xl text-left border-2 transition-all mb-2 shadow-sm " + (type === 'term' ? 'text-sm font-bold' : 'text-xs font-medium');
        if (isMatched) cls += " bg-emerald-900/30 border-emerald-800/50 text-emerald-500 opacity-50";
        else if (isSelected) cls += " bg-gradient-to-r from-amber-500 to-yellow-500 border-amber-300 text-indigo-950 shadow-[0_0_15px_rgba(251,191,36,0.4)] scale-105 z-10";
        else if (state.matchError && isSelected) cls += " bg-rose-600 border-rose-400 text-white";
        else cls += " bg-indigo-950 border-indigo-700 text-indigo-100 hover:border-indigo-400 hover:bg-indigo-900";

        return `<button ${isMatched || state.matchProcessing ? 'disabled' : ''} onclick="clickMatch('${type}', '${item.id}')" class="${cls}">${item.text}</button>`;
      }).join('');

      return `
        <div class="flex flex-col h-full min-h-0 p-4 sm:p-6 pb-2">
          <h3 class="text-base font-bold text-center mb-4 text-indigo-100 shrink-0 drop-shadow-sm">${data.question}</h3>
          <div class="flex gap-2 sm:gap-3 flex-1 overflow-hidden min-h-0 ${state.matchError ? 'shake' : ''}">
            <div class="flex-1 overflow-y-auto pr-1 pb-4 flex flex-col">${drawColumn(state.matchTerms, 'term')}</div>
            <div class="flex-1 overflow-y-auto pl-1 pb-4 flex flex-col">${drawColumn(state.matchDefs, 'def')}</div>
          </div>
          <div class="text-center pt-2"><span class="text-xs uppercase font-bold text-indigo-400">Соедините пары</span></div>
        </div>
      `;
    }

    // --- ЛОГИКА ---
    window.startLevel = (id) => {
      state.currentLevelId = id;
      state.view = 'level';
      state.phase = 'theory';
      state.step = 0;
      state.currentTaskIndex = 0;
      resetTaskState();
      render();
    };

    window.goMap = () => { state.view = 'map'; render(); };
    
    window.nextTheory = () => {
      const level = CAMPAIGN.find(l => l.id === state.currentLevelId);
      if (state.step < level.theory.length - 1) state.step++;
      else state.phase = 'tasks';
      render();
    };

    window.nextTask = () => {
      const level = CAMPAIGN.find(l => l.id === state.currentLevelId);
      resetTaskState();
      if (state.currentTaskIndex < level.tasks.length - 1) {
        state.currentTaskIndex++;
      } else {
        state.phase = 'result';
      }
      render();
    };

    window.finishLevel = () => {
      if (!state.completedLevels.includes(state.currentLevelId)) {
        state.completedLevels.push(state.currentLevelId);
      }
      state.view = 'map';
      render();
    };

    window.resetProgress = () => {
      if(confirm('Сбросить весь прогресс империи?')) {
        state.completedLevels = [];
        state.unlockedLevels = CAMPAIGN.map(level => level.id); 
        render();
      }
    };

    function resetTaskState() {
      state.mcqOptions = null; state.mcqAnswered = false; state.mcqSelected = null;
      state.tfAnswered = null; state.tfSelected = null;
      state.orderAvailable = []; state.orderSelected = []; state.orderError = false; state.orderProcessing = false;
      state.matchTerms = []; state.matchDefs = []; state.matchSelectedTerm = null; state.matchSelectedDef = null; state.matchPairs = []; state.matchError = false; state.matchProcessing = false;
    }

    window.checkMCQ = (opt) => { state.mcqSelected = opt; state.mcqAnswered = true; render(); };
    window.resetMCQ = () => { state.mcqAnswered = false; state.mcqSelected = null; render(); };
    window.checkTF = (guess) => {
      const task = CAMPAIGN.find(l => l.id === state.currentLevelId).tasks[state.currentTaskIndex];
      state.tfAnswered = (guess === task.isTrue);
      render();
    };
    window.resetTF = () => { state.tfAnswered = null; render(); };

    window.selectOrder = (id) => {
      if(state.orderProcessing) return;
      const item = state.orderAvailable.find(i => i.id === id);
      state.orderAvailable = state.orderAvailable.filter(i => i.id !== id);
      state.orderSelected.push(item);
      render();
    };
    window.deselectOrder = (id) => {
      if(state.orderProcessing) return;
      const item = state.orderSelected.find(i => i.id === id);
      state.orderSelected = state.orderSelected.filter(i => i.id !== id);
      state.orderAvailable.push(item);
      render();
    };
    window.checkOrder = () => {
      if(state.orderProcessing) return;
      const task = CAMPAIGN.find(l => l.id === state.currentLevelId).tasks[state.currentTaskIndex];
      const isCorrect = state.orderSelected.every((item, idx) => item.text === task.items[idx]);
      if (isCorrect && state.orderSelected.length === task.items.length) {
        nextTask();
      } else {
        state.orderError = true;
        state.orderProcessing = true;
        render();
        setTimeout(() => {
          state.orderAvailable = shuffle([...state.orderAvailable, ...state.orderSelected]);
          state.orderSelected = [];
          state.orderError = false;
          state.orderProcessing = false;
          render();
        }, 1500);
      }
    };

    window.clickMatch = (type, id) => {
      if(state.matchProcessing) return;
      if (type === 'term') {
        state.matchSelectedTerm = state.matchSelectedTerm === id ? null : id;
      } else {
        state.matchSelectedDef = state.matchSelectedDef === id ? null : id;
      }
      
      if (state.matchSelectedTerm !== null && state.matchSelectedDef !== null) {
        state.matchProcessing = true;
        if (state.matchSelectedTerm === state.matchSelectedDef) {
          state.matchPairs.push(state.matchSelectedTerm);
          state.matchSelectedTerm = null;
          state.matchSelectedDef = null;
          state.matchProcessing = false;
          const task = CAMPAIGN.find(l => l.id === state.currentLevelId).tasks[state.currentTaskIndex];
          if (state.matchPairs.length === task.pairs.length) {
            setTimeout(nextTask, 500);
          }
        } else {
          state.matchError = true;
          render();
          setTimeout(() => {
            state.matchError = false;
            state.matchSelectedTerm = null;
            state.matchSelectedDef = null;
            state.matchProcessing = false;
            render();
          }, 500);
          return;
        }
      }
      render();
    };

    render();
  </script>
</body>
</html>

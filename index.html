<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финансовый дашборд Pro</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (Script load directly, config after) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Плавная смена темы */
        html { transition: background-color 0.3s ease, color 0.3s ease; scroll-behavior: smooth; }
        
        /* Кастомный скроллбар */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Убираем стрелочки у input type="number" */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        /* Glassmorphism утилиты */
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .dark .glass { background: rgba(15, 23, 42, 0.8); border-bottom: 1px solid rgba(30, 41, 59, 0.8); }

        /* Анимации (перенесены в CSS для 100% совместимости) */
        @keyframes slideUp {
            0% { transform: translateY(20px) scale(0.95); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        @keyframes toastIn {
            0% { transform: translateX(100%); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        .animate-toast-in { animation: toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 font-sans min-h-screen transition-colors duration-300 selection:bg-blue-500 selection:text-white pb-20">
    
    <!-- STICKY HEADER -->
    <header class="sticky top-0 z-40 glass transition-colors duration-300">
        <div class="p-4 md:px-8 max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
                    <i data-lucide="layers" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-600 dark:from-white dark:to-slate-400">CashFlow Pro</h1>
                    <p class="text-slate-500 dark:text-slate-400 text-xs font-medium uppercase tracking-wider">Финансовый дашборд</p>
                </div>
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto justify-end">
                <button onclick="app.toggleTheme()" class="p-2.5 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 hover:shadow-md transition-all duration-200" title="Переключить тему">
                    <div class="block dark:hidden"><i data-lucide="moon" class="w-5 h-5"></i></div>
                    <div class="hidden dark:block"><i data-lucide="sun" class="w-5 h-5"></i></div>
                </button>
                <button onclick="app.openModalForAdd()" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white px-5 py-2.5 rounded-xl font-medium transition-all duration-200 shadow-lg shadow-blue-500/30 hover:shadow-blue-500/50 hover:-translate-y-0.5">
                    <i data-lucide="plus" class="w-5 h-5"></i> <span class="hidden sm:inline">Добавить операцию</span><span class="inline sm:hidden">Добавить</span>
                </button>
            </div>
        </div>
    </header>

    <main class="p-4 md:p-8 max-w-7xl mx-auto space-y-8 mt-4">
        
        <!-- ALERTS -->
        <div id="alerts-container"></div>

        <!-- TOP STATS -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
            <!-- 1. Фактический баланс -->
            <div class="relative overflow-hidden bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-lg transition-all duration-300 group">
                <div class="absolute -right-6 -top-6 w-24 h-24 bg-blue-100 dark:bg-blue-900/20 rounded-full blur-2xl group-hover:bg-blue-200 dark:group-hover:bg-blue-900/40 transition-colors"></div>
                <div class="relative z-10">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="p-2.5 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-xl">
                            <i data-lucide="wallet" class="w-5 h-5"></i>
                        </div>
                        <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">Мой баланс</p>
                    </div>
                    <div id="balance-container" class="min-h-[40px] flex items-center"></div>
                </div>
            </div>
            
            <!-- 2. Плановые доходы -->
            <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-lg transition-all duration-300 group">
                <div class="flex items-center gap-3 mb-4">
                    <div class="p-2.5 bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 dark:text-emerald-400 rounded-xl group-hover:scale-110 transition-transform">
                        <i data-lucide="arrow-down-left" class="w-5 h-5"></i>
                    </div>
                    <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">Плановые доходы</p>
                </div>
                <h2 id="stat-planned-income" class="text-3xl font-bold text-slate-900 dark:text-white tracking-tight">0 ₽</h2>
            </div>

            <!-- 3. Плановые расходы -->
            <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-lg transition-all duration-300 group">
                <div class="flex items-center gap-3 mb-4">
                    <div class="p-2.5 bg-rose-50 dark:bg-rose-900/20 text-rose-600 dark:text-rose-400 rounded-xl group-hover:scale-110 transition-transform">
                        <i data-lucide="arrow-up-right" class="w-5 h-5"></i>
                    </div>
                    <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">Плановые расходы</p>
                </div>
                <h2 id="stat-planned-expense" class="text-3xl font-bold text-slate-900 dark:text-white tracking-tight">0 ₽</h2>
            </div>

            <!-- 4. Ожидаемый баланс -->
            <div id="stat-expected-card" class="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-lg transition-all duration-300 relative overflow-hidden group">
                <div id="stat-expected-glow" class="absolute -right-6 -bottom-6 w-24 h-24 rounded-full blur-2xl transition-colors"></div>
                <div class="relative z-10">
                    <div class="flex items-center gap-3 mb-4">
                        <div id="stat-expected-icon-bg" class="p-2.5 rounded-xl transition-colors">
                            <i data-lucide="line-chart" class="w-5 h-5"></i>
                        </div>
                        <p class="text-sm text-slate-500 dark:text-slate-400 font-medium" id="stat-expected-label">Прогноз баланса</p>
                    </div>
                    <h2 id="stat-expected-balance" class="text-3xl font-bold tracking-tight transition-colors">0 ₽</h2>
                </div>
            </div>
        </div>

        <!-- CHART SECTION -->
        <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 sm:p-6 transition-all duration-300">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                <div>
                    <h2 class="text-lg font-bold text-slate-900 dark:text-white">Движение средств</h2>
                    <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Визуализация прогноза Cash Flow</p>
                </div>
                <div class="flex items-center gap-2 bg-slate-100 dark:bg-slate-900/50 p-1.5 rounded-xl border border-slate-200/50 dark:border-slate-700/50">
                    <span class="text-slate-500 dark:text-slate-400 text-sm font-medium px-2">Период:</span>
                    <select id="forecast-days" onchange="app.setForecastDays(this.value)" class="bg-white dark:bg-slate-800 border-none text-slate-800 dark:text-slate-200 rounded-lg px-3 py-1.5 text-sm font-medium focus:ring-0 shadow-sm cursor-pointer outline-none transition-colors">
                        <option value="14">2 недели</option>
                        <option value="30" selected>Месяц</option>
                        <option value="60">2 месяца</option>
                        <option value="90">Квартал</option>
                    </select>
                </div>
            </div>
            <div id="chart-container" class="relative w-full h-[320px]"></div>
        </div>

        <!-- TRANSACTIONS TABLE & FILTERS -->
        <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm overflow-hidden transition-all duration-300">
            <div class="p-5 border-b border-slate-200 dark:border-slate-700 space-y-5">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <h2 class="text-lg font-bold text-slate-900 dark:text-white flex items-center gap-2">
                        Операции
                        <span id="tx-count" class="px-2.5 py-0.5 rounded-full bg-slate-100 dark:bg-slate-900 text-slate-500 dark:text-slate-400 text-xs font-semibold">0</span>
                    </h2>
                    
                    <div class="flex bg-slate-100 dark:bg-slate-900/80 p-1 rounded-xl w-full md:w-auto shadow-inner" id="type-filters">
                        <!-- Type buttons rendered via JS -->
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 bg-slate-50 dark:bg-slate-900/30 p-4 rounded-xl border border-slate-100 dark:border-slate-700/50">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wider">Категория</label>
                        <select id="filter-category" onchange="app.setFilter('category', this.value)" class="w-full bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-sm">
                            <option value="">Все категории</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wider">От</label>
                        <input type="date" id="filter-date-from" onchange="app.setFilter('dateFrom', this.value)" class="w-full bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-sm text-slate-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wider">До</label>
                        <input type="date" id="filter-date-to" onchange="app.setFilter('dateTo', this.value)" class="w-full bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-sm text-slate-500">
                    </div>
                    <div class="flex items-end" id="reset-filter-container">
                        <!-- Reset Button rendered via JS -->
                    </div>
                </div>
            </div>
            
            <div class="overflow-x-auto relative">
                <table class="w-full text-left border-collapse min-w-[700px]">
                    <thead>
                        <tr class="bg-slate-50/80 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400 text-xs font-semibold uppercase tracking-wider border-b border-slate-200 dark:border-slate-700">
                            <th class="py-4 px-6 w-32">Дата</th>
                            <th class="py-4 px-6">Категория / Источник</th>
                            <th class="py-4 px-6 text-right w-40">Сумма</th>
                            <th class="py-4 px-6 w-36">Статус</th>
                            <th class="py-4 px-6 text-center w-32">Действия</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100 dark:divide-slate-700/60">
                        <!-- Transactions rendered via JS -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- MODAL OVERLAY -->
    <div id="modal-overlay" class="hidden fixed inset-0 bg-slate-900/60 dark:bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300 opacity-0">
        <!-- MODAL CONTENT -->
        <div id="modal-content" class="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh] border border-slate-200 dark:border-slate-700 transform transition-all duration-300 scale-95 opacity-0">
            <div class="px-6 py-5 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50/50 dark:bg-slate-900/30">
                <h3 id="modal-title" class="text-xl font-bold text-slate-900 dark:text-white tracking-tight">Новая операция</h3>
                <button type="button" onclick="app.closeModal()" class="text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-colors p-2 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <form id="tx-form" onsubmit="app.handleSubmit(event)" class="p-6 space-y-6 overflow-y-auto custom-scrollbar">
                <input type="hidden" id="modal-tx-id">
                
                <!-- Custom Segmented Control -->
                <div class="relative flex bg-slate-100 dark:bg-slate-900/80 p-1.5 rounded-xl border border-slate-200/50 dark:border-slate-700/50 shadow-inner">
                    <div id="modal-type-slider" class="absolute top-1.5 bottom-1.5 w-[calc(50%-0.375rem)] bg-white dark:bg-slate-800 rounded-lg shadow-sm border border-slate-200/50 dark:border-slate-700/50 transition-all duration-300 ease-out z-0"></div>
                    <button type="button" id="btn-type-income" onclick="app.setModalType('income')" class="relative z-10 flex-1 py-2.5 text-sm font-semibold rounded-lg transition-colors text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200">Поступление</button>
                    <button type="button" id="btn-type-expense" onclick="app.setModalType('expense')" class="relative z-10 flex-1 py-2.5 text-sm font-semibold rounded-lg transition-colors text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200">Расход</button>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2 sm:col-span-1">
                        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wider">Дата операции</label>
                        <input type="date" id="modal-date" required class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900/50 border border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-100 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm">
                    </div>

                    <div class="col-span-2 sm:col-span-1">
                        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wider">Сумма (₽)</label>
                        <div class="relative">
                            <input type="number" id="modal-amount" required min="1" placeholder="0" class="w-full pl-4 pr-10 py-3 bg-slate-50 dark:bg-slate-900/50 border border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-100 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm font-semibold text-lg">
                            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">₽</span>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wider">Категория / Источник</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                            <i data-lucide="tag" class="w-4 h-4"></i>
                        </div>
                        <input type="text" id="modal-category" required autocomplete="off" placeholder="Введите или выберите ниже..." class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-900/50 border border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-100 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm">
                    </div>
                    <div id="category-suggestions" class="mt-3 flex flex-wrap gap-2"></div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wider">Комментарий <span class="text-slate-400 font-normal lowercase">(необяз.)</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 pt-3 pointer-events-none text-slate-400">
                            <i data-lucide="message-square" class="w-4 h-4"></i>
                        </div>
                        <textarea id="modal-comment" rows="2" placeholder="Краткое описание" class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-900/50 border border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-100 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm resize-none"></textarea>
                    </div>
                </div>

                <div class="pt-2 flex gap-3">
                    <button type="button" onclick="app.closeModal()" class="flex-1 px-4 py-3 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-300 rounded-xl font-semibold hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Отмена</button>
                    <button type="submit" id="modal-submit-btn" class="flex-1 px-4 py-3 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-700 hover:to-blue-600 text-white rounded-xl font-semibold transition-all shadow-lg shadow-blue-500/30 hover:shadow-blue-500/50 hover:-translate-y-0.5">Добавить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- ВЕСЬ JS КОД -->
    <script>
        // --- УТИЛИТЫ ---
        const utils = {
            formatMoney: (amount) => new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 }).format(amount),
            formatDate: (dateString) => {
                const [year, month, day] = dateString.split('-');
                return new Date(year, month - 1, day).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
            },
            getDateOffset: (days) => {
                const date = new Date();
                date.setDate(date.getDate() + days);
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            }
        };

        const INCOME_CATEGORIES = ["Зарплата", "Фриланс", "Кредит", "Возврат долга", "Продажа"];
        const EXPENSE_CATEGORIES = ["Продукты", "Логистика", "Аренда", "Зарплата сотрудникам", "Подписки", "Развлечения", "Транспорт"];

        // --- СОСТОЯНИЕ ПРИЛОЖЕНИЯ ---
        const state = {
            currentBalance: Number(localStorage.getItem('finDash_balance')) || 0,
            transactions: JSON.parse(localStorage.getItem('finDash_transactions')) || [],
            forecastDays: 30,
            filters: {
                type: 'all',
                category: '',
                dateFrom: '',
                dateTo: ''
            },
            ui: {
                theme: localStorage.getItem('finDash_theme') || 'light',
                isEditingBalance: false,
                tempBalance: 0,
                modalType: 'income',
                activeChartPoint: null 
            }
        };

        // --- ОСНОВНАЯ ЛОГИКА ---
        const app = {
            init() {
                if (state.ui.theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                this.renderAll();
            },

            saveState() {
                localStorage.setItem('finDash_balance', state.currentBalance.toString());
                localStorage.setItem('finDash_transactions', JSON.stringify(state.transactions));
            },

            toggleTheme() {
                const isDark = document.documentElement.classList.contains('dark');
                if (isDark) {
                    document.documentElement.classList.remove('dark');
                    state.ui.theme = 'light';
                } else {
                    document.documentElement.classList.add('dark');
                    state.ui.theme = 'dark';
                }
                localStorage.setItem('finDash_theme', state.ui.theme);
                this.renderChart(); // Обновляем цвета графика
            },

            showToast(title, message, type = 'success') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                
                const icons = {
                    success: '<div class="p-1.5 bg-emerald-100 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-400 rounded-lg"><i data-lucide="check-circle-2" class="w-5 h-5"></i></div>',
                    error: '<div class="p-1.5 bg-rose-100 dark:bg-rose-900/40 text-rose-600 dark:text-rose-400 rounded-lg"><i data-lucide="alert-circle" class="w-5 h-5"></i></div>',

            calculateForecast() {
                const data = [];
                let runningBalance = Number(state.currentBalance);
                let firstGap = null;

                for (let i = 0; i <= state.forecastDays; i++) {
                    const targetDate = utils.getDateOffset(i);
                    const dayTxs = state.transactions.filter(t => t.date === targetDate && t.status === 'planned');
                    
                    const dayIncome = dayTxs.filter(t => t.type === 'income').reduce((sum, t) => sum + Number(t.amount), 0);
                    const dayExpense = dayTxs.filter(t => t.type === 'expense').reduce((sum, t) => sum + Number(t.amount), 0);
                    
                    runningBalance += dayIncome;
                    runningBalance -= dayExpense;

                    if (runningBalance < 0 && !firstGap) {
                        firstGap = { date: targetDate, deficit: Math.abs(runningBalance) };
                    }

                    data.push({
                        dayIndex: i,
                        date: targetDate,
                        label: utils.formatDate(targetDate),
                        balance: runningBalance,
                        income: dayIncome,
                        expense: dayExpense,
                        isGap: runningBalance < 0
                    });
                }

                return { chartData: data, firstGap, finalBalance: runningBalance };
            },

                            <div class="p-2.5 bg-rose-100 dark:bg-rose-900/40 text-rose-600 dark:text-rose-400 rounded-xl shrink-0">
                                <i data-lucide="siren" class="w-6 h-6 animate-pulse"></i>
                            </div>
                            <div class="flex-1">
                                <h3 class="font-bold text-rose-900 dark:text-rose-200 text-sm sm:text-base">Внимание: Кассовый разрыв!</h3>
                                <p class="text-sm text-rose-700 dark:text-rose-300 mt-0.5">Ожидается дефицит средств <strong>${utils.formatDate(forecast.firstGap.date)}</strong>. Не хватает: <span class="font-bold border-b border-rose-300 border-dashed">${utils.formatMoney(forecast.firstGap.deficit)}</span></p>

                const plannedExpense = state.transactions.filter(t => t.type === 'expense' && t.status === 'planned').reduce((s, t) => s + Number(t.amount), 0);
                
                document.getElementById('stat-planned-income').textContent = utils.formatMoney(plannedIncome);
                document.getElementById('stat-planned-expense').textContent = utils.formatMoney(plannedExpense);
                document.getElementById('stat-expected-balance').textContent = utils.formatMoney(forecast.finalBalance);
                document.getElementById('stat-expected-label').textContent = `Прогноз (+${state.forecastDays}д)`;
                
                const expectedCard = document.getElementById('stat-expected-card');

                if (forecast.finalBalance >= 0) {
                    expectedGlow.className = 'absolute -right-6 -top-6 w-24 h-24 rounded-full blur-2xl transition-colors bg-indigo-100 dark:bg-indigo-900/20 group-hover:bg-indigo-200 dark:group-hover:bg-indigo-900/40';
                    expectedBg.className = 'p-2.5 rounded-xl transition-colors bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 group-hover:scale-110 transition-transform';
                    expectedText.className = 'text-3xl font-bold tracking-tight transition-colors text-slate-900 dark:text-white';
                } else {
                    expectedGlow.className = 'absolute -right-6 -top-6 w-24 h-24 rounded-full blur-2xl transition-colors bg-rose-100 dark:bg-rose-900/20 group-hover:bg-rose-200 dark:group-hover:bg-rose-900/40';
                    expectedBg.className = 'p-2.5 rounded-xl transition-colors bg-rose-50 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 group-hover:scale-110 transition-transform';
                    expectedText.className = 'text-3xl font-bold tracking-tight transition-colors text-rose-600 dark:text-rose-400';
                }
            },

            setActiveChartPoint(index) {
                state.ui.activeChartPoint = index;
                this.renderChart();
            },

            renderChart() {
                const container = document.getElementById('chart-container');
                const { chartData } = this.calculateForecast();
                
                if (chartData.length === 0) {
                    container.innerHTML = '<div class="absolute inset-0 flex items-center justify-center text-slate-400 text-sm">Нет данных для прогноза</div>';
                    return;
                }

                // Извлекаем размеры контейнера, но для SVG задаем viewBox
                const width = 900;
                const height = 320;
                const paddingX = 30;
                const paddingY = 40;
                const isDark = document.documentElement.classList.contains('dark');
                
                const maxBalance = Math.max(...chartData.map(d => d.balance), 10000);
                const minBalance = Math.min(...chartData.map(d => d.balance), 0);
                
                const yRange = (maxBalance - minBalance) * 1.2 || 1; 
                const yMinAdjusted = minBalance - (maxBalance - minBalance) * 0.1;

                const getX = (index) => paddingX + (index / (chartData.length - 1)) * (width - paddingX * 2);
                const getY = (val) => height - paddingY - ((val - yMinAdjusted) / yRange) * (height - paddingY * 2);

                const zeroY = getY(0);
                const points = chartData.map((d, i) => `${getX(i)},${getY(d.balance)}`).join(' ');
                const polygonPoints = `${getX(0)},${height - paddingY} ${points} ${getX(chartData.length - 1)},${height - paddingY}`;

                // Цветовая схема
                const gridLineColor = isDark ? '#1e293b' : '#f1f5f9';
                const gapBgColor = isDark ? '#4c0519' : '#fff1f2'; // rose-950 / rose-50
                const gapLineColor = isDark ? '#f43f5e' : '#e11d48';
                const mainLineColor = isDark ? '#6366f1' : '#4f46e5'; // indigo
                const pointBgColor = isDark ? '#1e293b' : '#ffffff';
                const textColor = isDark ? '#64748b' : '#94a3b8';

                let svg = `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" class="w-full h-full font-sans relative z-0">
                            <defs>
                                <linearGradient id="chart-gradient" x1="0" y1="0" x2="0" y2="1">
                                    <stop offset="0%" stop-color="${mainLineColor}" stop-opacity="${isDark ? '0.3' : '0.15'}" />
                                    <stop offset="100%" stop-color="${mainLineColor}" stop-opacity="0" />
                                </linearGradient>
                            </defs>`;
                
                // Горизонтальные линии сетки
                const gridLines = 5;
                for(let i=0; i<=gridLines; i++) {
                    const lineY = paddingY + (i/gridLines) * (height - paddingY*2);
                    svg += `<line x1="${paddingX}" y1="${lineY}" x2="${width - paddingX}" y2="${lineY}" stroke="${gridLineColor}" stroke-width="1" />`;
                }

                // Зоны кассового разрыва (красный фон)
                chartData.forEach((d, i) => {
                    if (d.balance < 0 && i < chartData.length - 1) {
                        const x1 = getX(i);
                        const x2 = getX(i + 1);
                        svg += `<rect x="${x1}" y="${paddingY}" width="${x2 - x1}" height="${height - paddingY * 2}" fill="${gapBgColor}" opacity="0.5" />`;
                    }
                });

                // Линия нуля, если она в пределах видимости
                if (zeroY > paddingY && zeroY < height - paddingY) {
                    svg += `<line x1="${paddingX}" y1="${zeroY}" x2="${width - paddingX}" y2="${zeroY}" stroke="${isDark ? '#334155' : '#cbd5e1'}" stroke-width="1.5" stroke-dasharray="4 4" />`;
                }

                // Заливка графика
                svg += `<polygon points="${polygonPoints}" fill="url(#chart-gradient)" />`;
                // Основная линия графика
                svg += `<polyline points="${points}" fill="none" stroke="${mainLineColor}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="drop-shadow-sm" />`;

                // Отрисовка точек и текста (кроме активной)
                chartData.forEach((d, i) => {
                    const hasIncome = d.income > 0;
                    const hasExpense = d.expense > 0;
                    const isImportant = hasIncome || hasExpense || d.isGap;
                    const isHovered = state.ui.activeChartPoint === i;
                    
                    if (!isImportant && i % 7 !== 0 && i !== chartData.length - 1 && !isHovered) return;

                    // Точки
                    svg += `<circle cx="${getX(i)}" cy="${getY(d.balance)}" r="${isImportant ? 4 : 2}" fill="${pointBgColor}" stroke="${d.isGap ? gapLineColor : mainLineColor}" stroke-width="${isImportant ? 2 : 1.5}" class="transition-all duration-300" />`;
                    
                    // Текст подписи оси X (даты)
                    if ((i % 7 === 0 || i === chartData.length - 1) && !isHovered) {
                        svg += `<text x="${getX(i)}" y="${height - 10}" font-size="11" font-weight="500" fill="${textColor}" text-anchor="middle">${d.label}</text>`;
                    }
                });

                // Отрисовка Активной карточки (Tooltip) поверх всего
                if (state.ui.activeChartPoint !== null && chartData[state.ui.activeChartPoint]) {
                    const i = state.ui.activeChartPoint;
                    const d = chartData[i];
                    const actX = getX(i);
                    const actY = getY(d.balance);
                    
                    // Вертикальная направляющая
                    svg += `<line x1="${actX}" y1="${paddingY}" x2="${actX}" y2="${height - paddingY}" stroke="${mainLineColor}" stroke-width="1" stroke-dasharray="4 4" opacity="0.5" />`;
                    
                    // Увеличенная точка с пульсацией (эмуляция тенями)
                    svg += `<circle cx="${actX}" cy="${actY}" r="6" fill="${mainLineColor}" stroke="${pointBgColor}" stroke-width="2" />`;
                    svg += `<circle cx="${actX}" cy="${actY}" r="12" fill="${mainLineColor}" opacity="0.2" />`;

                    // Карточка
                    const boxW = 150;
                    const boxH = 75;
                    let boxX = actX - boxW / 2;
                    if (boxX < 0) boxX = 0;
                    if (boxX + boxW > width) boxX = width - boxW;
                    let boxY = actY - boxH - 20;
                    if (boxY < 0) boxY = actY + 20;

                    const tooltipBg = isDark ? '#1e293b' : '#ffffff';
                    const tooltipBorder = isDark ? '#334155' : '#e2e8f0';

                    svg += `<rect x="${boxX}" y="${boxY}" width="${boxW}" height="${boxH}" fill="${tooltipBg}" stroke="${tooltipBorder}" stroke-width="1" rx="12" filter="drop-shadow(0 10px 15px rgba(0,0,0,0.1))" />`;
                    svg += `<text x="${boxX + boxW/2}" y="${boxY + 22}" font-size="11" font-weight="600" fill="${textColor}" text-anchor="middle" letter-spacing="0.5">${d.label}</text>`;
                    svg += `<text x="${boxX + boxW/2}" y="${boxY + 44}" font-size="16" font-weight="800" fill="${isDark ? '#f8fafc' : '#0f172a'}" text-anchor="middle">${utils.formatMoney(d.balance)}</text>`;
                    
                    if (d.income > 0 || d.expense > 0) {
                        let subText = '';
                        if (d.income > 0) subText += `+${utils.formatMoney(d.income)} `;
                        if (d.expense > 0) subText += `-${utils.formatMoney(d.expense)}`;
                        svg += `<text x="${boxX + boxW/2}" y="${boxY + 62}" font-size="11" font-weight="500" fill="${isDark ? '#94a3b8' : '#64748b'}" text-anchor="middle">${subText}</text>`;
                    }
                }

                // Интерактивные прозрачные хитбоксы для клика/ховера (поверх всех слоев)
                svg += `<g id="hitboxes">`;
                chartData.forEach((d, i) => {
                    const x1 = i === 0 ? 0 : getX(i) - (getX(i) - getX(i-1))/2;
                    const x2 = i === chartData.length - 1 ? width : getX(i) + (getX(i+1) - getX(i))/2;
                    svg += `<rect x="${x1}" y="0" width="${x2-x1}" height="${height}" fill="transparent" cursor="crosshair" onmousemove="app.setActiveChartPoint(${i})" onmouseleave="app.setActiveChartPoint(null)" />`;
                });
                svg += `</g>`;

                svg += `</svg>`;
                container.innerHTML = svg;
            },

            editBalance() {

            saveBalance() {
                const input = document.getElementById('temp-balance-input');
                state.currentBalance = Number(input.value) || 0;
                state.ui.isEditingBalance = false;
                this.saveState();
                this.renderAll();
                this.showToast('Баланс обновлен', `Новый баланс: ${utils.formatMoney(state.currentBalance)}`, 'success');
            },
            cancelEditBalance() {
                state.ui.isEditingBalance = false;
                this.renderBalance();
            },

            setForecastDays(days) {
                state.forecastDays = Number(days);
                state.ui.activeChartPoint = null; 
                this.renderAll();
            },

            setFilter(key, value) {
                state.filters[key] = value;
                this.renderTableAndFilters();
                lucide.createIcons();
            },
            resetFilters() {
                state.filters = { type: 'all', category: '', dateFrom: '', dateTo: '' };
                document.getElementById('filter-category').value = '';
                document.getElementById('filter-date-from').value = '';
                document.getElementById('filter-date-to').value = '';
                this.renderTableAndFilters();
                lucide.createIcons();
            },

            markAsDone(id) {
                const tx = state.transactions.find(t => t.id === id);
                if (tx) {
                    tx.status = 'done';
                    state.currentBalance += (tx.type === 'income' ? 1 : -1) * Number(tx.amount);
                    this.saveState();
                    this.renderAll();
                    this.showToast('Операция исполнена', tx.category, 'success');
                }
            },
            markAsPlanned(id) {
                const tx = state.transactions.find(t => t.id === id);
                if (tx) {
                    tx.status = 'planned';
                    state.currentBalance -= (tx.type === 'income' ? 1 : -1) * Number(tx.amount);
                    this.saveState();
                    this.renderAll();
                    this.showToast('Вернуто в план', tx.category, 'info');
                }
            },
            deleteTransaction(id) {
                const txIndex = state.transactions.findIndex(t => t.id === id);
                if (txIndex > -1) {
                    const tx = state.transactions[txIndex];
                    if (tx.status === 'done') {
                        state.currentBalance -= (tx.type === 'income' ? 1 : -1) * Number(tx.amount);
                    }
                    state.transactions.splice(txIndex, 1);
                    this.saveState();
                    this.renderAll();
                    this.showToast('Операция удалена', '', 'error');
                }
            },

            // --- МОДАЛЬНОЕ ОКНО ---

            openModalForAdd() {
                document.getElementById('modal-title').textContent = 'Новая операция';
                document.getElementById('modal-tx-id').value = '';
                document.getElementById('modal-date').value = utils.getDateOffset(0);
                document.getElementById('modal-amount').value = '';
                document.getElementById('modal-category').value = '';
                document.getElementById('modal-comment').value = '';
                document.getElementById('modal-submit-btn').textContent = 'Добавить операцию';
                
                this.setModalType('income');
                
                const overlay = document.getElementById('modal-overlay');
                const content = document.getElementById('modal-content');
                overlay.classList.remove('hidden');
                
                // Trigger reflow for animation
                void overlay.offsetWidth;
                
                overlay.classList.remove('opacity-0');
                content.classList.remove('opacity-0', 'scale-95');
                content.classList.add('opacity-100', 'scale-100');
            },

            openModalForEdit(id) {
                const tx = state.transactions.find(t => t.id === id);
                if (!tx) return;

                document.getElementById('modal-title').textContent = 'Редактирование';
                document.getElementById('modal-tx-id').value = tx.id;
                document.getElementById('modal-date').value = tx.date;
                document.getElementById('modal-amount').value = tx.amount;
                document.getElementById('modal-category').value = tx.category;
                document.getElementById('modal-comment').value = tx.comment || '';
                document.getElementById('modal-submit-btn').textContent = 'Сохранить изменения';
                
                this.setModalType(tx.type);
                
                const overlay = document.getElementById('modal-overlay');
                const content = document.getElementById('modal-content');
                overlay.classList.remove('hidden');
                
                void overlay.offsetWidth;
                
                overlay.classList.remove('opacity-0');
                content.classList.remove('opacity-0', 'scale-95');
                content.classList.add('opacity-100', 'scale-100');
            },

            closeModal() {
                const overlay = document.getElementById('modal-overlay');
                const content = document.getElementById('modal-content');
                
                overlay.classList.add('opacity-0');
                content.classList.remove('opacity-100', 'scale-100');
                content.classList.add('opacity-0', 'scale-95');
                
                setTimeout(() => {
                    overlay.classList.add('hidden');
                }, 300); // Wait for transition
            },

            setModalType(type) {
                state.ui.modalType = type;
                
                const btnIncome = document.getElementById('btn-type-income');
                const btnExpense = document.getElementById('btn-type-expense');
                const slider = document.getElementById('modal-type-slider');
                const suggestionsContainer = document.getElementById('category-suggestions');

                const userCats = [...new Set(state.transactions.filter(t => t.type === type).map(t => t.category))];

                if (type === 'income') {
                    btnIncome.classList.replace('text-slate-500', 'text-emerald-600');
                    btnIncome.classList.replace('dark:text-slate-400', 'dark:text-emerald-400');
                    btnExpense.classList.replace('text-rose-600', 'text-slate-500');
                    btnExpense.classList.replace('dark:text-rose-400', 'dark:text-slate-400');
                    slider.style.transform = 'translateX(0)';
                    
                    const allCats = [...new Set([...INCOME_CATEGORIES, ...userCats])].slice(0, 8);
                    suggestionsContainer.innerHTML = allCats.map(c => `<button type="button" onclick="document.getElementById('modal-category').value = '${c}'" class="px-3 py-1.5 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:border-emerald-500 hover:text-emerald-600 text-xs font-semibold rounded-lg transition-all border border-slate-200 dark:border-slate-700 shadow-sm whitespace-nowrap">${c}</button>`).join('');
                } else {
                    btnExpense.classList.replace('text-slate-500', 'text-rose-600');
                    btnExpense.classList.replace('dark:text-slate-400', 'dark:text-rose-400');
                    btnIncome.classList.replace('text-emerald-600', 'text-slate-500');
                    btnIncome.classList.replace('dark:text-emerald-400', 'dark:text-slate-400');
                    slider.style.transform = 'translateX(100%)';
                    
                    const allCats = [...new Set([...EXPENSE_CATEGORIES, ...userCats])].slice(0, 8);
                    suggestionsContainer.innerHTML = allCats.map(c => `<button type="button" onclick="document.getElementById('modal-category').value = '${c}'" class="px-3 py-1.5 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:border-rose-500 hover:text-rose-600 text-xs font-semibold rounded-lg transition-all border border-slate-200 dark:border-slate-700 shadow-sm whitespace-nowrap">${c}</button>`).join('');
                }
            },

            handleSubmit(e) {
                e.preventDefault();
                
                const id = document.getElementById('modal-tx-id').value;
                const type = state.ui.modalType;
                const date = document.getElementById('modal-date').value;
                const amount = Number(document.getElementById('modal-amount').value);
                const category = document.getElementById('modal-category').value.trim();
                const comment = document.getElementById('modal-comment').value.trim();

                if (!amount || !category) return;

                if (id) {
                    const tx = state.transactions.find(t => t.id === id);
                    if (tx) {
                        if (tx.status === 'done') {
                            const oldVal = (tx.type === 'income' ? 1 : -1) * Number(tx.amount);
                            const newVal = (type === 'income' ? 1 : -1) * amount;
                            state.currentBalance += (newVal - oldVal);
                        }
                        tx.type = type;
                        tx.date = date;
                        tx.amount = amount;
                        tx.category = category;
                        tx.comment = comment;
                    }
                    this.showToast('Операция обновлена', category, 'success');
                } else {
                    state.transactions.push({
                        id: Date.now().toString(),
                        type,
                        date,
                        amount,
                        category,
                        comment,
                        status: 'planned'
                    });
                    this.showToast('Операция добавлена', `${category} на ${utils.formatMoney(amount)}`, 'success');
                }

                this.saveState();
                this.renderAll();
                this.closeModal();
            }
        };

        // Close modal on click outside
        document.getElementById('modal-overlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) app.closeModal();
        });

        window.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
